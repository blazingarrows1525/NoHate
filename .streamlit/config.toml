[theme]
primaryColor = "#ef4444"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = true
maxUploadSize = 200

[logger]
level = "info"

[client.toolbarMode]
mode = "minimal"

[server]
maxUploadSize = 200
enableXsrfProtection = true
headless = true
